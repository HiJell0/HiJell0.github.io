<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lincoln Law Client Portal — Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom) }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .animate-fade-in { animation: fadeIn .3s ease-out }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script src="sandbox.js"></script>
  <script>
    const data = window.PORTAL_DATA;
    const container = injectLayout();

    // Fix container for full-bleed messaging layout
    const pc = document.getElementById('page-content');
    pc.className = 'h-full';

    let threads = data.messageThreads.map(t => ({ ...t, messages: [...t.messages] }));
    let activeThreadId = threads[0]?.id || null;
    let mobileView = 'list'; // 'list' | 'thread'

    function getThread(id) { return threads.find(t => t.id === id); }

    function lastMessage(thread) {
      return thread.messages[thread.messages.length - 1] || null;
    }

    // ── Thread List ──────────────────────────────────────

    function renderThreadList() {
      return threads.map(thread => {
        const last = lastMessage(thread);
        const isActive = thread.id === activeThreadId;
        const isResolved = thread.status === 'resolved';
        const preview = last ? last.text.slice(0, 60) + (last.text.length > 60 ? '…' : '') : 'No messages yet';
        const timeStr = last ? msgTimeShort(last.time) : '';

        return `<button onclick="selectThread('${thread.id}')"
          class="w-full text-left px-4 py-4 border-b border-stone-100 transition-colors hover:bg-stone-50 ${isActive ? 'bg-[#1e3a5c]/5 border-l-2 border-l-[#1e3a5c]' : ''}">
          <div class="flex items-start justify-between gap-2 mb-1">
            <p class="text-sm font-semibold ${isResolved ? 'text-stone-400' : 'text-stone-900'} truncate flex-1">${thread.subject}</p>
            <span class="text-[10px] text-stone-400 whitespace-nowrap shrink-0">${timeStr}</span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <p class="text-xs text-stone-400 truncate flex-1">${preview}</p>
            ${isResolved
              ? `<span class="shrink-0 text-[11px] font-medium text-stone-400">Resolved</span>`
              : `<span class="shrink-0 w-2 h-2 rounded-full bg-[#1e3a5c]"></span>`
            }
          </div>
        </button>`;
      }).join('');
    }

    // ── Message Bubbles ──────────────────────────────────

    function renderThreadMessages(thread) {
      if (!thread) return '';
      return thread.messages.map((msg, idx) => {
        const isClient = msg.sender === 'client';
        const isResolution = msg.isResolution;
        const isIntro = msg.isIntro;

        if (isResolution) {
          return `<div class="flex justify-center my-3">
            <div class="bg-emerald-50 border border-emerald-100 text-emerald-700 text-xs font-medium px-4 py-2 rounded-full flex items-center gap-2">
              <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>
              ${msg.text}
            </div>
          </div>`;
        }

        if (isIntro) {
          return `<details class="group mb-4 mt-1">
            <summary class="flex items-center gap-2 text-xs text-stone-400 hover:text-stone-600 cursor-pointer list-none select-none py-1">
              <i data-lucide="info" class="w-3.5 h-3.5 shrink-0 text-[#1e3a5c]"></i>
              <span class="flex-1">About your conversations with Andrew Curtis</span>
              <svg class="w-3 h-3 text-stone-300 transition-transform group-open:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
            </summary>
            <div class="mt-2 bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 text-xs text-stone-600 leading-relaxed">
              ${msg.text}
            </div>
          </details>`;
        }

        const bubbleBase = isClient
          ? 'bg-[#1e3a5c] text-white rounded-2xl rounded-tr-sm'
          : 'bg-white border border-stone-200 text-stone-900 rounded-2xl rounded-tl-sm';

        const senderLabel = !isClient && msg.senderName
          ? `<p class="text-[10px] font-semibold text-stone-400 mb-1 px-1">${msg.senderName}</p>`
          : '';

        const timeLabel = `<p class="text-[10px] text-stone-300 mt-1 px-1 ${isClient ? 'text-right' : ''}">${msgTimeShort(msg.time)}</p>`;

        return `<div class="flex flex-col ${isClient ? 'items-end' : 'items-start'} mb-1">
          ${senderLabel}
          <div class="max-w-[80%] md:max-w-[70%] px-4 py-2.5 shadow-sm text-sm leading-snug ${bubbleBase}">
            <p>${msg.text}</p>
          </div>
          ${timeLabel}
        </div>`;
      }).join('');
    }

    // ── New Thread Modal ─────────────────────────────────

    function openNewThread() {
      showModal(`
        <div class="px-6 py-4 border-b border-stone-100 flex items-center justify-between bg-stone-50/50">
          <h3 class="font-bold text-stone-900">New Message</h3>
          <button onclick="hideModal()" class="p-2 hover:bg-stone-200 rounded-lg transition-colors">
            <i data-lucide="x" class="w-5 h-5 text-stone-500"></i>
          </button>
        </div>
        <div class="p-6 space-y-4">
          <textarea id="new-thread-msg" placeholder="What do you need help with?" class="w-full h-36 px-4 py-3 rounded-md border border-stone-200 focus:outline-none focus:ring-1 focus:ring-stone-400 text-sm resize-none"></textarea>
          <div class="flex justify-end gap-3">
            <button onclick="hideModal()" class="px-4 py-2 text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors">Cancel</button>
            <button onclick="submitNewThread()" class="flex items-center gap-2 bg-[#1e3a5c] text-white px-5 py-2 rounded-xl text-sm font-semibold hover:bg-[#152d47] transition-all">
              <i data-lucide="send" class="w-4 h-4"></i> Send
            </button>
          </div>
        </div>`);
    }

    function submitNewThread() {
      const text = document.getElementById('new-thread-msg').value.trim();
      if (!text) return;
      const words = text.split(/\s+/);
      const subject = words.slice(0, 6).join(' ') + (words.length > 6 ? '…' : '');

      const newThread = {
        id: 'thread-' + Date.now(),
        subject,
        status: 'open',
        messages: [
          {
            id: Date.now(),
            sender: 'staff',
            senderName: 'Andrew Curtis',
            text: `Hi, I'm Andrew Curtis, your attorney throughout this entire process. I have a great team of paralegals helping me stay on top of your questions.`,
            time: new Date().toISOString(),
            isIntro: true
          },
          { id: Date.now() + 1, sender: 'client', text, time: new Date().toISOString() }
        ]
      };

      portalAPI('POST', '/api/portal/{clientId}/messages/new', { subject, text });
      threads.unshift(newThread);
      hideModal();
      selectThread(newThread.id);
      renderAll();
    }

    // ── Full Render ──────────────────────────────────────

    function renderAll() {
      const thread = getThread(activeThreadId);

      container.innerHTML = `
      <div class="h-full flex overflow-hidden bg-white">

        <!-- Thread List (desktop: always visible; mobile: toggled) -->
        <div id="thread-list-pane" class="
          ${mobileView === 'list' ? 'flex' : 'hidden'} md:flex
          w-full md:w-80 flex-col border-r border-stone-100 bg-white shrink-0">

          <!-- List Header -->
          <div class="px-4 py-4 border-b border-stone-100 flex items-center justify-between bg-stone-50/60">
            <h2 class="text-base font-bold text-stone-900">Messages</h2>
            <button onclick="openNewThread()" class="flex items-center gap-1.5 text-xs font-semibold text-[#1e3a5c] hover:text-[#152d47] transition-colors bg-[#1e3a5c]/8 px-3 py-1.5 rounded-lg">
              <i data-lucide="pencil" class="w-3.5 h-3.5"></i> New
            </button>
          </div>

          <!-- Thread Items -->
          <div class="flex-1 overflow-y-auto">
            ${threads.length === 0
              ? `<div class="flex flex-col items-center justify-center h-full text-stone-400 text-sm gap-2 p-8 text-center">
                   <i data-lucide="message-circle" class="w-10 h-10 opacity-30"></i>
                   <p>No messages yet</p>
                 </div>`
              : renderThreadList()
            }
          </div>
        </div>

        <!-- Thread View (desktop: always visible; mobile: toggled) -->
        <div id="thread-view-pane" class="
          ${mobileView === 'thread' ? 'flex' : 'hidden'} md:flex
          flex-1 flex-col min-w-0 bg-white">

          ${thread ? `
          <!-- Thread Header -->
          <div class="px-4 py-3.5 border-b border-stone-100 flex items-center gap-3 bg-stone-50/60 shrink-0">
            <button onclick="goBackToList()" class="md:hidden p-2 -ml-1 rounded-lg hover:bg-stone-100 transition-colors">
              <i data-lucide="chevron-left" class="w-5 h-5 text-stone-600"></i>
            </button>
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-stone-900 text-sm truncate">${thread.subject}</p>
              <p class="text-[11px] text-stone-400">Andrew Curtis · Lincoln Law</p>
            </div>
            ${thread.status === 'resolved'
              ? `<span class="text-[11px] font-medium text-stone-400">Resolved</span>`
              : `<span class="text-[11px] font-medium text-emerald-600">Open</span>`
            }
          </div>

          <!-- Messages -->
          <div id="msg-scroll" class="flex-1 overflow-y-auto p-4 space-y-1 bg-stone-50/30">
            ${renderThreadMessages(thread)}
            ${thread.status === 'resolved' ? `
              <div class="flex justify-center mt-4">
                <p class="text-[11px] text-stone-400 bg-white border border-stone-100 px-3 py-1.5 rounded-full">This conversation has been resolved</p>
              </div>` : ''}
          </div>

          <!-- Input -->
          ${thread.status !== 'resolved' ? `
          <div class="p-3 md:p-4 bg-white border-t border-stone-100 shrink-0 pb-safe">
            <form id="msg-form" class="flex gap-2">
              <input id="msg-input" type="text" placeholder="Reply to ${thread.subject}…"
                class="flex-1 px-4 py-3 rounded-md border border-stone-200 focus:outline-none focus:ring-1 focus:ring-stone-400 bg-stone-50/50 focus:bg-white transition-all text-sm">
              <button type="submit" id="msg-send" disabled
                class="bg-[#1e3a5c] text-white p-3 rounded-xl hover:bg-[#152d47] disabled:opacity-40 disabled:cursor-not-allowed transition-all shrink-0">
                <i data-lucide="send" class="w-5 h-5"></i>
              </button>
            </form>
          </div>` : ''}
          ` : `
          <!-- No thread selected -->
          <div class="flex-1 flex flex-col items-center justify-center text-stone-400 gap-3 p-8">
            <i data-lucide="message-square" class="w-12 h-12 opacity-20"></i>
            <p class="text-sm">Select a conversation</p>
            <button onclick="openNewThread()" class="text-sm font-semibold text-[#1e3a5c] hover:underline mt-1">Start a new message</button>
          </div>
          `}
        </div>

      </div>`;

      lucide.createIcons({ nameAttr: 'data-lucide' });

      // Scroll to bottom of messages
      const scrollEl = document.getElementById('msg-scroll');
      if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;

      // Input handling
      const input = document.getElementById('msg-input');
      const sendBtn = document.getElementById('msg-send');
      const form = document.getElementById('msg-form');

      if (input && sendBtn && form) {
        input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim(); });

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const text = input.value.trim();
          if (!text) return;
          const thread = getThread(activeThreadId);
          if (!thread) return;

          thread.messages.push({ id: Date.now(), sender: 'client', text, time: new Date().toISOString() });
          portalAPI('POST', '/api/portal/{clientId}/messages', { threadId: activeThreadId, text });
          input.value = '';
          sendBtn.disabled = true;

          renderAll();
        });
      }
    }

    function selectThread(id) {
      activeThreadId = id;
      mobileView = 'thread';
      renderAll();
    }

    function goBackToList() {
      mobileView = 'list';
      renderAll();
    }

    renderAll();
    initIcons();
  </script>
</body>
</html>
