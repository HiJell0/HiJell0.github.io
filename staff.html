<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lincoln Law Client Portal — Staff Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .pb-safe{padding-bottom:env(safe-area-inset-bottom)}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}.animate-fade-in{animation:fadeIn .5s ease-out}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    const data = window.PORTAL_DATA;
    const container = injectLayout();

    // For staff page, override the nav to show staff links
    // (In a real app the layout would detect role; here we just re-render sidebar)
    const aside = document.querySelector('aside nav');
    if (aside) {
      aside.innerHTML = `<a href="staff.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors bg-stone-100 text-stone-900">
        ${icon('users', 'w-5 h-5 text-stone-900')} Client Overview
      </a>`;
    }
    // Override bottom nav for mobile
    const bottomNav = document.querySelector('nav.md\\:hidden');
    if (bottomNav) {
      bottomNav.innerHTML = `<a href="staff.html" class="flex flex-col items-center p-2 rounded-lg min-w-[64px] text-stone-900">
        ${icon('users', 'w-6 h-6 mb-1')}<span class="text-[10px] font-medium">Client Overview</span>
      </a>`;
    }
    // Add switch-to-client in sidebar footer
    const sideFooter = document.querySelector('aside > div:last-child');
    if (sideFooter) {
      sideFooter.innerHTML = `<a href="index.html" class="flex w-full items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-50 hover:text-stone-900 transition-colors">
        ${icon('log-out', 'w-5 h-5 text-stone-400')} Switch to Client
      </a>`;
    }
    // Mobile header switch
    const mobileHeader = document.querySelector('header span');
    if (mobileHeader) {
      mobileHeader.outerHTML = `<a href="index.html" class="text-xs font-medium text-stone-500 bg-stone-100 px-3 py-1.5 rounded-full">Switch Role</a>`;
    }

    const pendingDocs = data.documents.filter(d => d.status === 'Pending');
    const notes = data.activities.filter(a => a.type === 'note');

    function renderTasks() {
      return data.tasks.map(t => `
        <div class="flex items-center justify-between p-3 rounded-xl border border-stone-100 bg-white">
          <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full ${t.status === 'completed' ? 'bg-emerald-500' : 'bg-amber-500'}"></div>
            <span class="text-sm font-medium ${t.status === 'completed' ? 'text-stone-500 line-through' : 'text-stone-900'}">${t.title}</span>
          </div>
          <span class="text-xs text-stone-400 capitalize">${t.status}</span>
        </div>
      `).join('');
    }

    function renderNotes() {
      if (notes.length === 0) return `<p class="text-sm text-stone-500 text-center py-4">No internal notes yet.</p>`;
      return notes.map(n => `
        <div class="p-3 rounded-xl bg-amber-50 border border-amber-100">
          <p class="text-sm text-amber-900">${n.description.replace('Staff Note: ', '')}</p>
          <p class="text-xs text-amber-700/70 mt-2 flex items-center gap-1">
            ${icon('clock', 'w-3 h-3')} ${fmtTime(n.date)}
          </p>
        </div>
      `).join('');
    }

    function renderPendingDocs() {
      if (pendingDocs.length === 0) {
        return `<div class="text-center py-8 text-stone-500 bg-stone-50 rounded-2xl border border-stone-100 border-dashed">
          ${icon('check-circle-2', 'w-8 h-8 mx-auto mb-3 text-emerald-400')}
          <p>No documents pending review.</p>
        </div>`;
      }
      return pendingDocs.map(doc => `
        <div class="border border-stone-200 rounded-2xl p-4 bg-stone-50" id="doc-card-${doc.id}">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h3 class="font-medium text-stone-900">${doc.name}</h3>
              <p class="text-xs text-stone-500 mt-1">Uploaded ${fmtDate(doc.uploadedAt)}</p>
            </div>
            <div class="flex gap-2">
              <a href="#placeholder-staff-approve-doc" class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded-lg text-sm font-medium hover:bg-emerald-200 transition-colors">
                ${icon('check-circle-2', 'w-4 h-4')} Approve
              </a>
              <button onclick="toggleReject('${doc.id}')" class="flex items-center gap-1.5 px-3 py-1.5 bg-red-100 text-red-700 rounded-lg text-sm font-medium hover:bg-red-200 transition-colors">
                ${icon('x-circle', 'w-4 h-4')} Reject
              </button>
            </div>
          </div>
          <div id="reject-form-${doc.id}" class="hidden mt-4 bg-white p-4 rounded-xl border border-red-100">
            <label class="block text-sm font-medium text-stone-700 mb-2">Reason for rejection (sent to client)</label>
            <textarea id="reject-note-${doc.id}" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm" rows="3" placeholder="e.g., The second page is blurry..."></textarea>
            <div class="flex justify-end gap-2 mt-3">
              <button onclick="toggleReject('${doc.id}')" class="px-3 py-1.5 text-sm text-stone-500 hover:text-stone-700">Cancel</button>
              <a href="#placeholder-staff-reject-doc" class="px-3 py-1.5 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700">Confirm Rejection</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    container.innerHTML = `
    <div class="space-y-8 animate-fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-stone-900">Client Overview: ${data.client.fullName}</h1>
          <p class="text-stone-500 mt-2">Manage case progress, documents, and tasks.</p>
        </div>
        <div class="flex items-center gap-3 bg-stone-100 px-4 py-2 rounded-xl border border-stone-200">
          <span class="text-sm font-medium text-stone-600">Current Stage:</span>
          <select id="stage-select" class="bg-transparent font-semibold text-stone-900 focus:outline-none cursor-pointer">
            ${['Getting Started', 'Building Your Case', 'Protected', '341 Meeting', 'Fresh Start'].map(s =>
              `<option value="${s}" ${s === data.caseStage ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Left -->
        <div class="lg:col-span-2 space-y-8">

          <!-- Doc Review Queue -->
          <section class="bg-white rounded-3xl p-6 shadow-sm border border-stone-100">
            <h2 class="text-lg font-semibold text-stone-900 mb-6 flex items-center gap-2">
              ${icon('file-text', 'w-5 h-5 text-blue-500')} Document Review Queue
              <span class="bg-blue-50 text-blue-600 text-xs font-medium px-2.5 py-1 rounded-full ml-auto">${pendingDocs.length} pending</span>
            </h2>
            <div class="space-y-4" id="doc-queue">${renderPendingDocs()}</div>
          </section>

          <!-- Tasks -->
          <section class="bg-white rounded-3xl p-6 shadow-sm border border-stone-100">
            <h2 class="text-lg font-semibold text-stone-900 mb-6 flex items-center gap-2">
              ${icon('check-circle-2', 'w-5 h-5 text-emerald-500')} Manage Client Tasks
            </h2>

            <form id="task-form" class="mb-8 bg-stone-50 p-5 rounded-2xl border border-stone-200">
              <h3 class="text-sm font-medium text-stone-900 mb-4 flex items-center gap-2">
                ${icon('plus', 'w-4 h-4')} Push New Task to Client
              </h3>
              <div class="space-y-4">
                <input id="task-title" type="text" placeholder="Task Title (e.g., Upload 2023 Tax Return)" class="w-full px-4 py-2.5 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-stone-900 text-sm">
                <input id="task-desc" type="text" placeholder="Optional description or instructions..." class="w-full px-4 py-2.5 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-stone-900 text-sm">
                <a href="#placeholder-staff-assign-task" id="assign-btn" class="block w-full bg-stone-900 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-stone-800 opacity-50 pointer-events-none transition-colors text-center">Assign Task</a>
              </div>
            </form>

            <div class="space-y-3">
              <h3 class="text-sm font-medium text-stone-500 uppercase tracking-wider mb-4">Current Tasks</h3>
              <div id="task-list">${renderTasks()}</div>
            </div>
          </section>
        </div>

        <!-- Right -->
        <div class="space-y-8">

          <!-- Firm Status -->
          <section class="bg-stone-900 rounded-3xl p-6 shadow-lg text-white">
            <h2 class="text-lg font-semibold text-stone-100 mb-4 flex items-center gap-2">
              ${icon('edit-3', 'w-5 h-5 text-stone-400')} Update Firm Status
            </h2>
            <p class="text-xs text-stone-400 mb-4">This is the plain-English explanation the client sees on their dashboard.</p>
            <textarea id="firm-status" class="w-full px-4 py-3 bg-stone-800 border border-stone-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-500 text-sm text-stone-200 min-h-[120px]">${data.firmStatus}</textarea>
            <a href="#placeholder-staff-save-status" class="block w-full mt-4 bg-white text-stone-900 py-2.5 rounded-xl text-sm font-medium hover:bg-stone-200 transition-colors text-center">Save Status</a>
          </section>

          <!-- Internal Notes -->
          <section class="bg-white rounded-3xl p-6 shadow-sm border border-stone-100">
            <h2 class="text-lg font-semibold text-stone-900 mb-6 flex items-center gap-2">
              ${icon('alert-circle', 'w-5 h-5 text-amber-500')} Internal Notes
            </h2>
            <form id="note-form" class="mb-6">
              <div class="relative">
                <input id="note-input" type="text" placeholder="Add a case note..." class="w-full pl-4 pr-12 py-3 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-stone-900 text-sm bg-stone-50">
                <a href="#placeholder-staff-add-note" id="note-submit" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-stone-900 text-white rounded-lg opacity-50 pointer-events-none hover:bg-stone-800">
                  ${icon('send', 'w-4 h-4')}
                </a>
              </div>
            </form>
            <div class="space-y-4" id="notes-list">${renderNotes()}</div>
          </section>

        </div>
      </div>
    </div>`;

    // Toggle reject form
    window.toggleReject = function(id) {
      const el = document.getElementById('reject-form-' + id);
      el.classList.toggle('hidden');
    };

    // Enable/disable assign button based on title input
    const titleInput = document.getElementById('task-title');
    const assignBtn = document.getElementById('assign-btn');
    titleInput.addEventListener('input', () => {
      if (titleInput.value.trim()) {
        assignBtn.classList.remove('opacity-50', 'pointer-events-none');
      } else {
        assignBtn.classList.add('opacity-50', 'pointer-events-none');
      }
    });

    // Enable/disable note submit
    const noteInput = document.getElementById('note-input');
    const noteSubmit = document.getElementById('note-submit');
    noteInput.addEventListener('input', () => {
      if (noteInput.value.trim()) {
        noteSubmit.classList.remove('opacity-50', 'pointer-events-none');
      } else {
        noteSubmit.classList.add('opacity-50', 'pointer-events-none');
      }
    });

    initIcons();
  </script>
</body>
</html>
